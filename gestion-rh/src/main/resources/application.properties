spring.application.name=gestion-rh
# Configuration pour WampServer
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_recrutement?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# On laisse vide aprĶs le "=" car Wamp n'a pas de mot de passe par dķfaut
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Dķsactivation temporaire de la sķcuritķ pour les tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration



# Autoriser des fichiers plus grands (ex: gros CVs ou lettres de motivation)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB