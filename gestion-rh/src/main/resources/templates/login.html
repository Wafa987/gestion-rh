<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portail Recruitment - Authentification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        .nav-pills .nav-link {
            color: #64748b;
            font-weight: 500;
        }
        .nav-pills .nav-link.active {
            background-color: #2563eb;
            color: white;
        }
        .btn-primary-custom {
            background-color: #2563eb;
            color: white;
            font-weight: 600;
            border: none;
            padding: 12px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .btn-primary-custom:hover {
            background-color: #1d4ed8;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div th:if="${error}" class="alert alert-danger border-0 small py-2 text-center rounded-3 mb-3" th:text="${error}">Erreur</div>
    <div th:if="${success}" class="alert alert-success border-0 small py-2 text-center rounded-3 mb-3" th:text="${success}">Succès</div>

    <ul class="nav nav-pills nav-justified mb-4 bg-light p-1 rounded-3" id="authTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginForm" type="button" role="tab">Connexion</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerForm" type="button" role="tab">Créer un compte</button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="loginForm" role="tabpanel">
            <form th:action="@{/web/auth/login}" method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Adresse Email</label>
                    <input type="email" name="email" class="form-control" placeholder="exemple@miage.fr" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-secondary">Mot de passe</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 shadow-sm">Se connecter</button>
            </form>
        </div>

        <div class="tab-pane fade" id="registerForm" role="tabpanel">
            <form th:action="@{/web/auth/register}" method="POST">

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Prénom</label>
                    <input type="text" name="firstName" class="form-control" placeholder="Mélissa" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Nom de famille</label>
                    <input type="text" name="lastName" class="form-control" placeholder="Wafa" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Adresse Email</label>
                    <input type="email" name="email" class="form-control" placeholder="candidat@miage.fr" required>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-semibold text-secondary">Créer un Mot de passe</label>
                    <input type="password" name="password" class="form-control" placeholder="Minimum 6 caractères" required>
                </div>

                <button type="submit" class="btn btn-success w-100 fw-semibold p-2.5 rounded-3 border-0 text-white shadow-sm" style="background-color: #10b981;">
                    Enregistrer mon compte candidat 🚀
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
