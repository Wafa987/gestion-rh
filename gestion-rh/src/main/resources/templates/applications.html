<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Suivi des Candidatures - Portail RH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-global: #f8fafc;
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --primary-blue: #2563eb;
            --text-dark: #0f172a;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-global);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }
        .sidebar { background-color: var(--sidebar-bg); min-height: 100vh; color: #94a3b8; }
        .sidebar-brand { font-weight: 700; color: white !important; letter-spacing: -0.02em; font-size: 1.25rem; }
        .sidebar a { color: #94a3b8; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: all 0.2s ease; }
        .sidebar a:hover, .sidebar a.active { color: white; background-color: var(--sidebar-hover); }
        .sidebar a.active { background-color: var(--primary-blue) !important; color: white !important; }

        .card-custom {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        .form-control-custom, .form-select-custom {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.85rem;
            padding: 6px 10px;
        }
        .section-title { font-weight: 700; letter-spacing: -0.02em; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-4 d-flex flex-column gap-2">
            <div class="sidebar-brand text-center mb-4 py-2">💼 Portail Administrateur</div>
            <hr class="text-secondary opacity-25">
            <ul class="nav flex-column gap-2">
                <li class="nav-item"><a th:href="@{/web/dashboard}" class="nav-link p-2.5 rounded">📊 Tableau de bord</a></li>
                <li class="nav-item"><a th:href="@{/web/offers}" class="nav-link p-2.5 rounded">💼 Offres d'emploi</a></li>
                <li class="nav-item"><a th:href="@{/web/applications}" class="nav-link active p-2.5 rounded">📩 Candidatures</a></li>
                <li class="nav-item"><a th:href="@{/web/onboardings}" class="nav-link p-2.5 rounded">🚀 Onboarding</a></li>
            </ul>
        </div>
        <div class="col-md-10 p-5">
            <h2 class="mb-4 section-title">📩 Gestion & Revue des Candidatures Reçues</h2>
            <div class="card card-custom p-4 bg-white">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th class="border-0 text-secondary small fw-bold">Candidat</th>
                            <th class="border-0 text-secondary small fw-bold">Offre visée</th>
                            <th class="border-0 text-secondary small fw-bold">Documents</th>
                            <th class="border-0 text-secondary small fw-bold">Statut Actuel</th>
                            <th class="border-0 text-secondary small fw-bold">Notes & Planification</th>
                            <th class="border-0 text-secondary small fw-bold text-end">Mise à jour Dossier</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="app : ${applications}" class="border-bottom">
                            <td class="fw-bold text-dark py-3" th:text="${app.candidate.firstName + ' ' + app.candidate.lastName}">Nom</td>
                            <td class="text-secondary" th:text="${app.jobOffer != null ? app.jobOffer.title : 'Poste Général'}">Offre</td>
                            <td>
                                <div class="d-flex flex-column gap-1">
                                    <a th:href="@{'/uploads/cv/' + ${app.cvUrl}}" target="_blank" class="btn btn-sm btn-outline-primary py-1 px-2 fw-medium" style="font-size: 0.75rem; border-radius: 6px;">📄 Voir CV</a>
                                    <a th:href="@{'/uploads/lm/' + ${app.coverLetter}}" target="_blank" class="btn btn-sm btn-outline-secondary py-1 px-2 fw-medium" style="font-size: 0.75rem; border-radius: 6px;">✉️ Voir LM</a>
                                </div>
                            </td>
                            <td>
                                <span class="badge rounded-pill px-2.5 py-1.5"
                                      th:classappend="${app.status.name() == 'RECU' ? 'bg-info text-white' : (app.status.name() == 'ACCEPTE' ? 'bg-success text-white' : (app.status.name() == 'REJETE' ? 'bg-danger text-white' : 'bg-warning text-dark'))}"
                                      th:text="${app.status}" style="font-size: 0.75rem; font-weight: 600;">RECU</span>
                            </td>
                            <td class="text-muted small" style="max-width: 180px;" th:text="${app.recruiterComment != null ? app.recruiterComment : 'Aucune note.'}">Pas de com</td>
                            <td class="text-end py-3">
                                <form th:action="@{/web/applications/update-status}" method="POST" class="d-inline-flex flex-column gap-1.5 p-2 bg-light rounded-3 border text-start">
                                    <input type="hidden" name="appId" th:value="${app.id}">

                                    <div class="d-flex gap-1">
                                        <select class="form-select form-select-custom" name="newStatus" style="width: 120px;">
                                            <option value="EN_COURS" th:selected="${app.status.name() == 'EN_COURS'}">En cours</option>
                                            <option value="ENTRETIEN" th:selected="${app.status.name() == 'ENTRETIEN'}">Entretien 📅</option>
                                            <option value="ACCEPTE" th:selected="${app.status.name() == 'ACCEPTE'}">Accepter 🎉</option>
                                            <option value="REJETE" th:selected="${app.status.name() == 'REJETE'}">Refuser ❌</option>
                                        </select>
                                        <button type="submit" class="btn btn-sm btn-dark rounded-2 fw-semibold px-2.5">OK</button>
                                    </div>

                                    <div class="mt-1">
                                        <label class="form-label mb-0 text-secondary" style="font-size: 0.75rem; font-weight: 500;">Planifier un entretien :</label>
                                        <input type="datetime-local" name="interviewDate" class="form-control form-control-custom" style="width: 162px; font-size: 0.75rem; padding: 4px 8px;">
                                    </div>

                                    <input type="text" name="comment" class="form-control form-control-custom" style="width: 162px;" placeholder="Note ou décision..." th:value="${app.recruiterComment}">
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
